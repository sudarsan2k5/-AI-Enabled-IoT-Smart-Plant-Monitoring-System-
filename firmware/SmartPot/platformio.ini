; ESP32 (WROOM) — Smart Plant / Smart Pot
; pio run -e esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  beegee-tokyo/DHTesp@^1.0
  https://github.com/4-20mA/ModbusMaster.git
  bblanchon/ArduinoJson@^7.0.0

build_flags =
  -DCORE_DEBUG_LEVEL=0
